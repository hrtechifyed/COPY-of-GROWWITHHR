name: GrowWithHR CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "release/**"
      - "hotfix/**"

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality checks
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Check version consistency
        run: npm run version:check

      - name: Validate compliance data
        run: npm run validate:compliance

      - name: Run baseline and architecture contracts
        run: >
          npm run test:baseline &&
          npm run test:m1 &&
          npm run test:m2 &&
          npm run test:m3

      - name: Run client and server readiness checks
        run: >
          npm run test:client-readiness &&
          npm run test:server-cors

      - name: Run presentation and report experience checks
        run: >
          npm run test:presentation &&
          npm run test:report-experience

      - name: Run journey and scenario regression checks
        run: >
          npm run test:static &&
          npm run test:frontend &&
          npm run test:journeys &&
          npm run test:input-combinations &&
          npm run test:report-scenarios &&
          npm run test:golden

      - name: Run archived UX compatibility checks
        run: npm run test:ux
