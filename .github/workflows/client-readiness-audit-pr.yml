name: Client Readiness Audit Dispatcher

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/client-readiness-audit.yml"
      - ".github/workflows/client-readiness-deep-audit.yml"
      - ".github/workflows/client-readiness-audit-pr.yml"

permissions:
  actions: write
  contents: read

jobs:
  dispatch-and-collect:
    if: github.head_ref == 'audit/client-readiness-v0.18.0'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Dispatch the focused audit workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh workflow run client-readiness-deep-audit.yml
          --repo "${GITHUB_REPOSITORY}"
          --ref audit/client-readiness-v0.18.0

      - name: Wait for the focused audit run
        id: wait
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          sleep 8
          RUN_ID=""
          for attempt in $(seq 1 60); do
            RUN_ID="$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow client-readiness-deep-audit.yml \
              --branch audit/client-readiness-v0.18.0 \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')"
            if [[ -n "$RUN_ID" ]]; then
              break
            fi
            sleep 5
          done
          if [[ -z "$RUN_ID" ]]; then
            echo "Focused audit run was not found."
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          gh run watch "$RUN_ID" \
            --repo "${GITHUB_REPOSITORY}" \
            --exit-status

      - name: Download focused audit evidence
        if: always() && steps.wait.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p collected-deep-audit
          gh run download "${{ steps.wait.outputs.run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name client-readiness-deep-audit \
            --dir collected-deep-audit

      - name: Upload collected focused evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collected-client-readiness-deep-audit
          path: collected-deep-audit/
          if-no-files-found: warn
          retention-days: 7
