name: Apply Client Readiness Repairs

on:
  push:
    branches:
      - fix/client-readiness-v0.18.0
    paths:
      - ".github/workflows/apply-client-readiness.yml"

permissions:
  contents: write

concurrency:
  group: apply-client-readiness-v0.18.0
  cancel-in-progress: false

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/client-readiness-v0.18.0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply confirmed repository repairs
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re
          import shutil

          root = Path('.')

          def read(path):
              return (root / path).read_text()

          def write(path, content):
              target = root / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content.rstrip() + '\n')

          def replace(path, old, new, required=True):
              source = read(path)
              if old not in source:
                  if required:
                      raise SystemExit(f'Expected text not found in {path}: {old[:100]}')
                  return
              write(path, source.replace(old, new))

          # Valid favicon reference for all HTML pages.
          for path in root.rglob('*.html'):
              if any(part in {'.git', 'node_modules', 'playwright-report', 'test-results'} for part in path.parts):
                  continue
              text = path.read_text()
              text = text.replace('href="assets/favicon.ico"', 'href="assets/favicon.svg" type="image/svg+xml"')
              text = text.replace("href='assets/favicon.ico'", "href='assets/favicon.svg' type='image/svg+xml'")
              path.write_text(text)

          # Retire duplicate/obsolete public surfaces while preserving the old URL.
          write('assessment.html', '''<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="robots" content="noindex, follow">
            <meta http-equiv="refresh" content="0; url=analyze-company.html">
            <link rel="canonical" href="analyze-company.html">
            <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
            <title>Assessment moved | GrowWithHR</title>
            <script>window.location.replace("analyze-company.html" + window.location.search + window.location.hash);</script>
          </head>
          <body>
            <main>
              <p>The current GrowWithHR assessment is available at <a href="analyze-company.html">analyze-company.html</a>.</p>
            </main>
          </body>
          </html>''')

          for obsolete in [
              'backupstyles.css',
              'js/intro-sequence.js',
              'js/old-email-service.js',
              'pages/company-profile.html',
              'pages/organization-profile.html'
          ]:
              target = root / obsolete
              if target.exists():
                  target.unlink()

          # Rename the still-active compatibility stylesheet so it is not presented
          # as a currently deployed intro experience.
          old_css = root / 'css/13-intro-experience.css'
          new_css = root / 'css/13-legacy-compatibility.css'
          if old_css.exists():
              old_css.rename(new_css)
          replace('styles.css', 'css/13-intro-experience.css', 'css/13-legacy-compatibility.css')
          css = read('css/13-legacy-compatibility.css')
          css = re.sub(
              r'^/\*.*?\*/',
              '/* GrowWithHR legacy compatibility styles. The former animated intro route is retired; these selectors remain only where current pages still depend on them. */',
              css,
              count=1,
              flags=re.S
          )
          write('css/13-legacy-compatibility.css', css)

          # Make the product version and assessment-contract versions explicit.
          replace(
              'analyze-company.html',
              '    "version": "2.0.0",\n    "chapters": 4,',
              '    "applicationVersion": "0.18.0",\n    "experienceVersion": "2.0.0",\n    "schemaVersion": 1,\n    "chapters": 4,'
          )

          # Desktop carousel controls were hidden by legacy/mobile cascade rules.
          homepage_css = read('css/16-homepage-refresh.css')
          homepage_css += '''

          /* Client-readiness repair: desktop controls must remain visible and operable. */
          @media (min-width: 768px) {
            body.home-page .capability-carousel {
              display: grid !important;
              grid-template-columns: 56px minmax(0, 1fr) 56px !important;
            }

            body.home-page .carousel-arrow {
              display: flex !important;
              align-items: center;
              justify-content: center;
            }
          }
          '''
          write('css/16-homepage-refresh.css', homepage_css)

          # Current, candid homepage capability statuses.
          replacements = {
              'Flagship capabilities to be included...': 'Current capabilities and roadmap',
              'Compliance Intelligence (Implemented)': 'Compliance advisory (Available)',
              'Automatically identify statutory obligations applicable today, upcoming compliance milestones and executive risks.': 'Receive a rules-based advisory with traceable facts, safe applicability language and official source references for further review.',
              'Organization Intelligence (to be done)': 'Organization Intelligence (Planned)',
              'Talent Intelligence (to be done)': 'Talent Intelligence (Planned)',
              'Leadership Intelligence (to be done)': 'Leadership Intelligence (Planned)',
              'Performance Intelligence (to be done)': 'Performance Intelligence (Planned)',
              'Learning Intelligence (to be done)': 'Learning Intelligence (Planned)',
              'Rewards Intelligence (to be done)': 'Rewards Intelligence (Planned)',
              'Company Coach (in progress)': 'Company Coach (Planned)'
          }
          index = read('index.html')
          for old, new in replacements.items():
              if old not in index:
                  raise SystemExit(f'Homepage text not found: {old}')
              index = index.replace(old, new)
          index = index.replace('<button class="carousel-arrow prev">', '<button class="carousel-arrow prev" type="button" aria-label="Previous capability">')
          index = index.replace('<button class="carousel-arrow next">', '<button class="carousel-arrow next" type="button" aria-label="Next capability">')
          write('index.html', index)

          # Remove retired routes from shared-shell active-route inference.
          site_shell = read('js/site-shell.js')
          for line in [
              '            "assessment.html": "analyze",\n',
              '            "company-profile.html": "platform",\n',
              '            "organization-profile.html": "platform"\n'
          ]:
              site_shell = site_shell.replace(line, '')
          site_shell = site_shell.replace('            "compliance-roadmap.html": "platform",\n', '            "compliance-roadmap.html": "platform"\n')
          write('js/site-shell.js', site_shell)

          # Safe, honest sample-report language.
          sample = read('sample-advisory-report.html')
          safe_replacements = {
              'Verified Sources': 'Official References',
              'Based on the sample company profile,\n                    GrowWithHR identified mandatory statutory obligations,\n                    governance improvements and future people investments.': 'Based on the fictional profile, GrowWithHR surfaced illustrative review topics, governance actions and future people priorities. Applicability and completion require confirmation.',
              'Mandatory\n                    </span>\n\n                    <strong class="metric-value">\n\n                        8': 'Review topics\n                    </span>\n\n                    <strong class="metric-value">\n\n                        3',
              'Applicable Today': 'Illustrative only',
              'Medium Legal Risk': 'Specialist confirmation',
              'Mandatory Compliance Obligations': 'Illustrative Compliance Review Topics',
              'These statutory obligations are applicable to the illustrative company profile\n                and require immediate attention.': 'These examples demonstrate how potentially relevant topics may be presented. They are not a legal determination and require organisation-specific confirmation.',
              'Why Applicable': 'Why this appears',
              'VERIFIED SOURCES': 'OFFICIAL SOURCE REFERENCES',
              'Every recommendation in GrowWithHR is supported using\n                publicly available government guidance and statutory authorities.': 'Source references support further review. They do not prove that a topic applies, that an obligation is complete or that evidence has been verified.'
          }
          for old, new in safe_replacements.items():
              sample = sample.replace(old, new)
          sample = sample.replace('Mandatory\n                            </span>', 'Specialist review\n                            </span>')
          write('sample-advisory-report.html', sample)

          # Keep future version synchronization aligned with the visible app version.
          sync = read('scripts/sync-version.mjs')
          marker = 'collectHtmlFiles(rootDirectory);\n'
          addition = '''collectHtmlFiles(rootDirectory);

          /** Keep embedded applicationVersion fields aligned with package.json. */
          for (const relativePath of htmlFiles) {
              processFile(relativePath, (source) => {
                  if (!source.includes('"applicationVersion"')) return source;
                  return source.replace(/"applicationVersion"\s*:\s*"[^"]+"/g, `"applicationVersion": "${version}"`);
              });
          }
          '''
          if 'embedded applicationVersion fields' not in sync:
              if marker not in sync:
                  raise SystemExit('sync-version insertion point missing')
              sync = sync.replace(marker, addition)
          write('scripts/sync-version.mjs', sync)

          # Root documentation: one clear stack and one authority model.
          write('README.md', '''# GrowWithHR

          **Current production stack:** the deployed product is the root-level HTML, CSS and JavaScript application backed by `server.js` for optional Gmail delivery. `apps/web/src` is an archived experimental React/TypeScript UX layer; it is not built, deployed or used by the public product.

          GrowWithHR is a rules-based executive HR and compliance advisory for founders, business leaders and People teams.

          ## Current release

          - Application version: `0.18.0`
          - Public assessment: `/analyze-company.html`
          - Private-beta Compliance DNA route: `/analyze-company-v3.html`
          - Private-beta feature flag: `complianceDnaV3: false`
          - Latest published release: `v0.18.0`

          The old `/assessment.html` URL redirects to the public assessment so visitors encounter one current journey.

          ## What is deployed

          - Guided four-chapter assessment with same-browser save and resume.
          - Deterministic stable advisory/report mapping.
          - Browser-generated PDF download.
          - Optional email delivery through the Node/Express Gmail API backend.
          - M1-M3 private-beta Compliance DNA foundations: Five-Act presentation, deterministic traceability and Compliance Story presentation.

          The private-beta route does not replace the public assessment and does not mutate protected report, PDF, email or delivery contracts.

          ## Data statement for demos

          **Assessment progress stays in the visitor's browser; only when the visitor requests email delivery are recipient details, advisory data and the generated PDF sent to the GrowWithHR backend for delivery through Gmail.**

          GrowWithHR currently has no customer account system, cloud-save service or dedicated assessment database. See `docs/DATA_FLOW.md` and the public privacy section in `more-info.html`.

          ## Repository map

          - `index.html` — public homepage.
          - `analyze-company.html` — stable public assessment.
          - `analyze-company-v3.html` — no-index private-beta review route.
          - `sample-advisory-report.html` — fictional, illustrative report.
          - `server.js` — health endpoint and Gmail delivery boundary.
          - `js/executive-assessment/` — stable assessment modules.
          - `js/assessment-v3/` — isolated M1-M3 private-beta modules.
          - `data/assessment/` and `data/schema/` — governed data and schemas.
          - `tests/` — maintained contract and browser coverage.
          - `apps/web/src/` — archived experiment, not production.

          ## Canonical documentation

          - `README.md` — current deployed product and stack decision.
          - `CHANGELOG.md` — authoritative release history.
          - `ROADMAP.md` — authoritative future milestones.
          - `docs/ARCHITECTURE.md` — deployed architecture.
          - `docs/DATA_FLOW.md` — current data flow and privacy boundary.
          - `docs/KNOWN_ISSUES.md` — current limitations and release blockers.
          - `docs/releases/` — immutable historical release manifests and validation records.

          `RELEASE_NOTES.md` and `update.md` are pointers only; they are not competing sources of truth.

          ## Local commands

          ```bash
          npm install
          npm run test:release
          npm run test:release:e2e
          npm start
          ```

          ## Security

          Secrets belong only in deployment environment variables. Never commit `.env`, OAuth credentials, Gmail app passwords or refresh tokens. See `SECURITY.md`.

          ## Product boundary

          GrowWithHR provides advisory information, not legal certification, verified compliance, evidence verification or professional legal, tax, payroll or employment advice.
          ''')

          write('RELEASE_NOTES.md', '''# GrowWithHR Release Notes

          `CHANGELOG.md` is the authoritative release history.

          - Current published release: `v0.18.0`
          - Detailed release manifests and validation records: `docs/releases/`
          - Future milestones: `ROADMAP.md`

          This file is retained as a stable pointer for old links and is not a second release-history source.
          ''')

          write('update.md', '''# Historical update pointer

          This former working-update document is no longer authoritative.

          - Current product and stack: `README.md`
          - Release history: `CHANGELOG.md`
          - Future work: `ROADMAP.md`
          - Current limitations: `docs/KNOWN_ISSUES.md`
          ''')

          write('ROADMAP.md', '''# GrowWithHR Product Roadmap

          Current application version: `0.18.0`  
          Current public route: `/analyze-company.html`  
          Private-beta route: `/analyze-company-v3.html` with `complianceDnaV3: false`  
          Last updated: 21 July 2026

          ## Completed milestones

          ### M0 — Baseline and recovery (`0.15.1-beta`)
          Complete. Established protected routes, persistence contracts, CI, deterministic fixtures and rollback records.

          ### M1 — Five-Act Story Foundation (`0.16.0-beta`)
          Complete and validated. Added the isolated private-beta route, compatibility adapter and accessible Five-Act presentation.

          ### M2 — Explainable Recommendation Foundation (`0.16.0-beta`)
          Complete and validated. Added confirmed/derived facts, deterministic rule evaluation, applicability/evidence separation and source traceability.

          ### M3 — Compliance Story and Safe Health Model (`0.18.0`)
          Complete, validated and published. Added a versioned Compliance Story model, company snapshot, safe status counts, ranked priorities, grouped findings, assumptions and limitations without changing stable contracts.

          ## Next milestone

          ### M4 — Compliance Action Planning (`0.19.0`, planned)

          Candidate scope:

          - convert governed findings into local action items;
          - owner, target-date and status fields;
          - policy/checklist views;
          - local export-ready summaries;
          - no cloud persistence, accounts or document upload.

          M4 must consume M2/M3 governed outputs and must not recreate applicability logic in the UI.

          ## Later milestones

          - **M5 — Browser-local workspace (`0.20.0`, planned):** local tasks, calendar and optional local backup/import.
          - **M6 — Consent-based persistence (`0.21.0`, approval required):** authentication, tenant isolation, retention, deletion/export and audit controls.
          - **M7 — RAG-ready hardening (`0.22.0`, planned):** frozen citation contracts, source lifecycle, monitoring, security and disaster-recovery evidence. RAG must never replace deterministic applicability decisions.

          ## Release gates

          Every release must pass version consistency, compliance-data validation, the complete regression suite, stable/private browser coverage, responsive and keyboard checks, privacy/security review, release-manifest review and a documented rollback path.
          ''')

          write('FILES_OVERVIEW.md', '''# GrowWithHR Current File Overview

          This inventory describes the deployed `0.18.0` product. Historical detail belongs in `docs/releases/` and archived audit documents.

          ## Public surfaces

          - `index.html` — homepage.
          - `analyze-company.html` — single stable public assessment.
          - `assessment.html` — compatibility redirect to the stable assessment.
          - `official-resources.html` — source information.
          - `sample-advisory-report.html` — fictional illustrative sample.
          - `more-info.html` — about, privacy and contact.

          ## Private review surface

          - `analyze-company-v3.html` — no-index M1-M3 private beta; feature flag remains off.

          ## Runtime

          - `app.js`, `styles.css`, `css/`, `js/` — static production application.
          - `server.js` — optional Gmail delivery backend and `/api/health`.
          - `data/` — governed catalogs, schemas and knowledge material.

          ## Quality and governance

          - `tests/`, `playwright.config.ts`, `.github/workflows/` — maintained automated checks.
          - `README.md`, `CHANGELOG.md`, `ROADMAP.md`, `docs/` — canonical documentation.
          - `apps/web/src/` — archived React/TypeScript experiment; not deployed.
          ''')

          write('SECURITY.md', '''# Security Policy

          ## Reporting

          Do not disclose credentials or sensitive findings in a public issue. Contact `hrtechifyed@gmail.com` with the subject `GrowWithHR security report`.

          ## Secret handling

          - Store Gmail/OAuth values only in the deployment environment.
          - Never commit `.env`, app passwords, client secrets or refresh tokens.
          - Treat any credential that has appeared in Git history as exposed: revoke/rotate it before external use, then follow a controlled history-rewrite and cache-purge procedure.
          - `/api/health` may report configuration status and missing variable names, but must never return credential values.

          ## Supported product

          Security fixes apply to the current root-level HTML/CSS/JavaScript application and `server.js`. The experimental `apps/web/src` layer is not deployed.
          ''')

          write('docs/ARCHITECTURE.md', '''# GrowWithHR Architecture

          ## Deployment decision

          The production application is the root-level static HTML/CSS/JavaScript site. `server.js` supplies the optional Gmail delivery API. `apps/web/src` is an archived experimental React/TypeScript UX layer and is not part of the deployed build.

          ## Public architecture

          1. `index.html` presents the product and links to `analyze-company.html`.
          2. The stable assessment modules validate answers and persist same-browser progress under protected keys.
          3. The stable report mapper prepares the advisory record.
          4. `js/pdf.js` generates the PDF in the browser.
          5. When email delivery is requested, `js/gmail-service.js` sends a data-minimised request to `POST /api/send-advisory`.
          6. `server.js` validates the request and sends through the Gmail API.

          ## Private-beta architecture

          `/analyze-company-v3.html` is no-index and disabled from public routing by default. M1-M3 modules consume protected assessment answers through compatibility adapters and produce isolated traceability/Compliance Story output. They do not write a new traceability key or change stable report, PDF, email or delivery contracts.

          ## Protected browser keys

          - `growwithhr-advisory-briefing-v2`
          - `growwithhr-report`
          - `growwithhr-lead`
          - `growwithhr-advisory-delivery-v1`
          - `growwithhr-industry-catalog-v1`

          Feature-flag overrides use the documented `growwithhr-feature-` prefix and are not assessment records.
          ''')

          write('docs/DATA_FLOW.md', '''# GrowWithHR Data Flow

          ## One-sentence demo answer

          **Assessment progress stays in the visitor's browser; only when email delivery is requested are recipient details, advisory data and the generated PDF sent to the GrowWithHR backend for Gmail delivery.**

          ## Browser flow

          - Company-level and aggregated workforce answers are collected in `analyze-company.html`.
          - Progress may be stored under `growwithhr-advisory-briefing-v2` for same-browser resume.
          - The advisory record may be stored under `growwithhr-report` and lead/delivery metadata under their protected keys.
          - The PDF is generated in the browser.
          - The industry catalog cache may use `growwithhr-industry-catalog-v1` even on a clean profile.

          ## Delivery flow

          When the visitor explicitly requests email delivery, the browser sends the recipient, required advisory data and PDF payload to `POST /api/send-advisory`. The Express backend validates size, type and required fields, applies rate limiting and calls Gmail. Sent mail and attachments may remain in the connected Gmail account under its retention settings.

          ## What does not exist

          GrowWithHR currently has no customer account, dedicated assessment database, cloud-save service, cross-device resume, document/evidence repository or RAG conversation-history store.

          ## Private beta

          M1-M3 diagnostics read protected assessment state without adding traceability or Compliance Story data to stable persistence.
          ''')

          write('docs/PRIVACY_DATA_FLOW.md', '''# Privacy and Data Flow

          The canonical current data-flow document is `docs/DATA_FLOW.md`.

          The public-facing wording is maintained in `more-info.html#privacy`. Both describe same-browser progress, browser-generated reports/PDFs, explicit backend email delivery and the current absence of accounts or a dedicated assessment database.
          ''')

          write('docs/KNOWN_ISSUES.md', '''# GrowWithHR Known Issues and Release Blockers

          Last reviewed: 21 July 2026

          ## Critical external-readiness action

          Historical Git analysis found a committed `.env` containing Gmail configuration and an app-password value. Current `.gitignore` prevents future `.env` commits, but deletion from the current tree is not equivalent to secret revocation or history removal. Before any external demonstration that uses email delivery:

          1. revoke and rotate every historically committed Gmail/app-password credential;
          2. verify deployment values are the rotated values;
          3. perform a controlled Git history rewrite and GitHub cache/reference purge if complete repository-history removal is required;
          4. re-run secret scanning after the purge.

          ## Deployment boundary

          The GitHub Pages homepage is static. Relative `/api/send-advisory` delivery requires the application to be served from the Node/Express deployment or an explicitly configured API origin. Email delivery should not be demonstrated from a static-only preview.

          ## Manual verification still required

          Automated Chromium, WebKit and mobile-emulation checks do not replace a physical iOS/Android touch test or a real Safari device test. Complete those checks before a client session.

          ## Intentional limitations

          - The public route remains the stable four-chapter assessment.
          - The M1-M3 v3 route remains private and no-index.
          - No accounts, cloud persistence, cross-device resume or evidence repository exist.
          - Applicability and evidence status are advisory and separate; no output is legal certification.
          ''')

          write('docs/IMPLEMENTATION_SUMMARY.md', '''# GrowWithHR Implementation Summary

          Current release: `0.18.0`.

          - M0 baseline/recovery: complete.
          - M1 Five-Act private-beta foundation: complete.
          - M2 deterministic traceability: complete.
          - M3 Compliance Story and Safe Health Model: complete and published.
          - M4 local action planning: planned.

          Production remains the root HTML/CSS/JavaScript application plus the optional Express/Gmail delivery backend. See `README.md`, `docs/ARCHITECTURE.md` and `ROADMAP.md`.
          ''')

          write('docs/TESTING_CHECKLIST.md', '''# GrowWithHR Testing Checklist

          ## Automated release checks

          - `npm run version:check`
          - `npm run validate:compliance`
          - `npm test`
          - `npm run test:release:e2e`

          ## Client-readiness checks

          - Homepage navigation and capability carousel.
          - Stable assessment first viewport, clean start, complete journey, review and save/resume.
          - PDF generation and download.
          - Backend `/api/health` without secret values.
          - `/api/send-advisory` validation and throttling.
          - Sample report wording and layout.
          - Chromium, WebKit and mobile emulation.
          - Physical mobile and real Safari manual pass.
          - Console free of unexplained warnings/errors.
          - Rotated deployment credentials and monitored notification/reply-to addresses.
          ''')

          write('docs/CONTRIBUTING.md', '''# Contributing to GrowWithHR

          ## Production stack

          Contribute product fixes to the root HTML/CSS/JavaScript application and `server.js`. Do not treat `apps/web/src` as production; it is an archived experiment.

          ## Workflow

          - Branch from current `main` using `feature/*`, `fix/*`, `release/*` or `hotfix/*`.
          - Do not edit or force-push `main`.
          - Keep one concern per short-lived branch.
          - Add regression coverage for behavior changes.
          - Run `npm run test:release` and relevant Playwright tests.
          - Update canonical documentation; preserve `docs/releases/` as historical records.
          ''')

          write('growwithhr-rag/README.md', '''# GrowWithHR RAG Research Area

          This directory is future research only. It is not built, deployed or used by the current `0.18.0` product.

          Any future retrieval layer may explain governed deterministic results and retrieve approved sources, but it must not invent obligations, override applicability, claim evidence verification or change protected report contracts.
          ''')

          # Mark remaining non-release planning/audit documents explicitly historical/current.
          banners = {
              'docs/INTRO_EXPERIENCE_V2_MASTER_PLAN.md': '> **Historical plan:** the former animated intro route is retired; `/assessment.html` now redirects to the stable assessment.\n\n',
              'docs/RESPONSIVE_REPAIR_AUDIT.md': '> **Historical audit record:** retained for implementation history; current requirements are in `docs/TESTING_CHECKLIST.md`.\n\n',
              'docs/STACKED_CARDS_ADVISORY_AUDIT.md': '> **Historical audit record:** retained for implementation history; the active public route is `/analyze-company.html`.\n\n',
              'docs/DESIGN_SYSTEM.md': '> **Current design reference:** verify implementation against the production root HTML/CSS/JavaScript stack.\n\n',
              'docs/UX_DECISIONS.md': '> **Current UX decision:** the root HTML/CSS/JavaScript application is production; the React/TypeScript layer is archived.\n\n',
              'docs/architecture/ADR-001-ui-framework-freeze.md': '> **Decision remains active:** production stays framework-free through the current roadmap unless superseded by a new ADR.\n\n'
          }
          for path, banner in banners.items():
              if (root / path).exists():
                  text = read(path)
                  if banner.strip() not in text:
                      write(path, banner + text)

          # Move root-level test planning documents under an intentional docs area.
          for old, new in [
              ('PLAYWRIGHT_TEST_PLAN.md', 'docs/testing/PLAYWRIGHT_PLAN.md'),
              ('RESPONSIVE_MANUAL_TEST_MATRIX.md', 'docs/testing/RESPONSIVE_MANUAL_MATRIX.md')
          ]:
              source = root / old
              if source.exists():
                  target = root / new
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_text('> **Testing reference:** use with `docs/TESTING_CHECKLIST.md`.\n\n' + source.read_text())
                  source.unlink()

          # Add maintained client-readiness checks.
          write('tests/client-readiness-checks.mjs', '''import assert from "node:assert/strict";
          import fs from "node:fs";

          const read = (path) => fs.readFileSync(path, "utf8");
          const packageJson = JSON.parse(read("package.json"));
          const assessment = read("analyze-company.html");
          const homepage = read("index.html");
          const sample = read("sample-advisory-report.html");
          const readme = read("README.md");
          const knownIssues = read("docs/KNOWN_ISSUES.md");

          assert(assessment.includes(`"applicationVersion": "${packageJson.version}"`));
          assert(assessment.includes('"experienceVersion": "2.0.0"'));
          assert(!assessment.includes('href="assets/favicon.ico"'));
          assert(homepage.includes('Current capabilities and roadmap'));
          assert(homepage.includes('aria-label="Next capability"'));
          assert(!homepage.includes('(to be done)'));
          assert(!homepage.includes('(in progress)'));
          assert(!sample.includes('VERIFIED SOURCES'));
          assert(!sample.includes('Mandatory Compliance Obligations'));
          assert(readme.startsWith('# GrowWithHR'));
          assert(readme.includes('archived experimental React/TypeScript UX layer'));
          assert(knownIssues.includes('Historical Git analysis found a committed `.env`'));
          for (const retired of ['backupstyles.css','js/intro-sequence.js','js/old-email-service.js','pages/company-profile.html','pages/organization-profile.html']) {
              assert(!fs.existsSync(retired), `${retired} must be retired.`);
          }
          assert(fs.existsSync('css/13-legacy-compatibility.css'));
          assert(fs.existsSync('assets/favicon.svg'));
          console.log('Client-readiness static checks passed.');
          ''')

          write('tests/e2e/homepage-client-readiness.spec.ts', '''import { expect, test } from "@playwright/test";

          test.describe("homepage client readiness", () => {
            test("desktop capability controls are visible and advance the carousel", async ({ page }) => {
              const problems: string[] = [];
              page.on("console", message => {
                if (["error", "warning"].includes(message.type())) problems.push(`${message.type()}: ${message.text()}`);
              });
              page.on("pageerror", error => problems.push(`pageerror: ${error.message}`));
              await page.setViewportSize({ width: 1280, height: 720 });
              await page.goto("/index.html", { waitUntil: "networkidle" });
              const track = page.locator(".carousel-track");
              const next = page.getByRole("button", { name: "Next capability" });
              await expect(next).toBeVisible();
              const before = await track.evaluate(element => element.scrollLeft);
              await next.click();
              await expect.poll(() => track.evaluate(element => element.scrollLeft)).toBeGreaterThan(before);
              await expect(page.locator(".capability-slide").nth(1)).toHaveClass(/active/);
              expect(problems).toEqual([]);
            });

            test("mobile carousel remains horizontally scrollable without desktop arrows", async ({ page }) => {
              await page.setViewportSize({ width: 390, height: 844 });
              await page.goto("/index.html", { waitUntil: "networkidle" });
              await expect(page.getByRole("button", { name: "Next capability" })).toBeHidden();
              const dimensions = await page.locator(".carousel-track").evaluate(element => ({ clientWidth: element.clientWidth, scrollWidth: element.scrollWidth }));
              expect(dimensions.scrollWidth).toBeGreaterThan(dimensions.clientWidth);
            });

            test("legacy assessment URL redirects to the single stable route", async ({ page }) => {
              await page.goto("/assessment.html?from=legacy", { waitUntil: "domcontentloaded" });
              await expect(page).toHaveURL(/analyze-company\.html\?from=legacy$/);
              await expect(page.locator("#landingScreen")).toBeVisible();
            });
          });
          ''')

          package_path = root / 'package.json'
          package_data = json.loads(package_path.read_text())
          scripts = package_data['scripts']
          scripts['test:client-readiness'] = 'node tests/client-readiness-checks.mjs'
          scripts['test'] = scripts['test'].replace('npm run test:static', 'npm run test:client-readiness && npm run test:static')
          scripts['test:release:e2e'] = scripts['test:release:e2e'].replace(' --project=chromium', ' tests/e2e/homepage-client-readiness.spec.ts --project=chromium')
          package_path.write_text(json.dumps(package_data, indent=2) + '\n')

          # Update static-test inventories and references after retiring old pages/assets.
          static = read('tests/requirements-static-check.js')
          for entry in [
              '    "assessment.html",\n',
              '    "compliance-roadmap.html",\n',
              '    "growth-roadmap.html",\n',
              '    "people-roadmap.html",\n',
              '    "pages/company-profile.html",\n',
              '    "pages/organization-profile.html"\n'
          ]:
              static = static.replace(entry, '')
          static = static.replace('css/13-intro-experience.css', 'css/13-legacy-compatibility.css')
          write('tests/requirements-static-check.js', static)

          frontend = read('tests/frontend-production-checks.js')
          frontend = frontend.replace("!html.includes('src=\"js/intro-sequence.js\"')", "!html.includes('src=\"js/intro-sequence.js\"')")
          write('tests/frontend-production-checks.js', frontend)

          workflow = read('.github/workflows/executive-assessment-tests.yml')
          if 'tests/e2e/homepage-client-readiness.spec.ts' not in workflow:
              workflow = workflow.replace('          tests/e2e/analyze-company-v3-compliance-story.spec.ts\n', '          tests/e2e/analyze-company-v3-compliance-story.spec.ts\n          tests/e2e/homepage-client-readiness.spec.ts\n')
          for path in ['index.html', 'app.js', 'css/16-homepage-refresh.css', 'sample-advisory-report.html']:
              quoted = f'      - "{path}"\n'
              if quoted not in workflow:
                  workflow = workflow.replace('      - "analyze-company.html"\n', f'      - "analyze-company.html"\n{quoted}', 1)
          write('.github/workflows/executive-assessment-tests.yml', workflow)

          # CHANGELOG remains authoritative; record this unreleased hygiene pass.
          changelog = read('CHANGELOG.md')
          entry = '''### Client readiness\n\n- Clarified the production stack and canonical documentation.\n- Restored visible desktop capability-carousel controls.\n- Retired obsolete duplicate routes and unused backup/legacy files.\n- Added a valid favicon and repaired internal file references.\n- Separated product, experience and schema versions in the assessment configuration.\n- Reworded the illustrative report to use safe advisory and source-reference language.\n- Added maintained client-readiness static and browser checks.\n- Recorded the historical credential-rotation and history-purge release blocker.\n\n'''
          if '### Client readiness' not in changelog:
              changelog = changelog.replace('## [Unreleased]\n\n', '## [Unreleased]\n\n' + entry)
          write('CHANGELOG.md', changelog)
          PY

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate maintained contracts
        run: |
          npm run version:check
          npm run validate:compliance
          npm test
          git diff --check

      - name: Install Chromium and WebKit
        run: |
          npm install --no-save --package-lock=false --no-audit --no-fund @playwright/test
          npx playwright install --with-deps chromium webkit

      - name: Validate stable, private and homepage browser paths
        run: |
          npx playwright test \
            tests/e2e/executive-assessment-modules.spec.ts \
            tests/e2e/analyze-company-current.spec.ts \
            tests/e2e/analyze-company-v3.spec.ts \
            tests/e2e/analyze-company-v3-traceability.spec.ts \
            tests/e2e/analyze-company-v3-compliance-story.spec.ts \
            tests/e2e/homepage-client-readiness.spec.ts \
            --project=chromium
          npx playwright test tests/e2e/homepage-client-readiness.spec.ts --project=chromium
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:4173 npx playwright test tests/e2e/homepage-client-readiness.spec.ts --project=chromium

      - name: Update repository description and topics
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}" \
            -f description='Rules-based executive HR and compliance advisory with explainable recommendations, browser-generated reports and a private-beta Compliance DNA experience.'
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/topics" \
            -H 'Accept: application/vnd.github+json' \
            --input - <<'JSON'
          {"names":["hr-tech","compliance","people-operations","executive-advisory","javascript","playwright","explainable-ai","india"]}
          JSON

      - name: Commit validated repairs
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-client-readiness.yml
          rm -rf playwright-report test-results
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "fix: complete client-readiness hygiene and verification"
          git push origin HEAD:fix/client-readiness-v0.18.0
