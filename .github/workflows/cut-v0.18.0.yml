name: Cut v0.18.0

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/cut-v0.18.0.yml"

permissions:
  contents: write

concurrency:
  group: cut-v0.18.0
  cancel-in-progress: false

jobs:
  cut-and-validate:
    if: github.head_ref == 'release/v0.18.0'
    name: Cut and validate v0.18.0
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      TARGET_VERSION: "0.18.0"
      EXPECTED_CURRENT_VERSION: "0.16.0-beta"
      RELEASE_BRANCH: "release/v0.18.0"

    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: release/v0.18.0
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify release starting point
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          if [[ "${CURRENT_VERSION}" != "${EXPECTED_CURRENT_VERSION}" ]]; then
            echo "Expected ${EXPECTED_CURRENT_VERSION}, found ${CURRENT_VERSION}."
            exit 1
          fi
          if [[ "$(git branch --show-current)" != "${RELEASE_BRANCH}" ]]; then
            echo "The workflow is not running on ${RELEASE_BRANCH}."
            exit 1
          fi

      - name: Install project dependencies
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Update canonical version and release records
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          target = os.environ["TARGET_VERSION"]
          previous = os.environ["EXPECTED_CURRENT_VERSION"]

          package_path = Path("package.json")
          package_data = json.loads(package_path.read_text())
          if package_data.get("version") != previous:
              raise SystemExit(
                  f"Expected package version {previous}, found {package_data.get('version')}"
              )
          package_data["version"] = target
          package_path.write_text(json.dumps(package_data, indent=2) + "\n")

          def replace_once(path, old, new):
              file_path = Path(path)
              text = file_path.read_text()
              if text.count(old) != 1:
                  raise SystemExit(
                      f"Expected one occurrence in {path}, found {text.count(old)}: {old}"
                  )
              file_path.write_text(text.replace(old, new, 1))

          replace_once(
              "tests/baseline-contract-checks.js",
              '    "0.16.0-beta",\n    "The current release baseline must use version 0.16.0-beta."',
              '    "0.18.0",\n    "The current release baseline must use version 0.18.0."'
          )
          replace_once(
              "tests/requirements-static-check.js",
              '            "GrowWithHR Public 0.16.0-beta",',
              '            "GrowWithHR Public 0.18.0",'
          )

          roadmap_path = Path("ROADMAP.md")
          roadmap = roadmap_path.read_text()
          start_marker = "## M3 — Compliance advisory presentation"
          end_marker = "\n---\n\n## M4 — Compliance action planning"
          start = roadmap.find(start_marker)
          end = roadmap.find(end_marker, start)
          if start == -1 or end == -1:
              raise SystemExit("The governed M3 roadmap section was not found.")
          completed_section = """## M3 — Compliance advisory presentation

**Status:** Complete and validated

**Release:** `v0.18.0`

### Exit result

M3 converts the governed M2 recommendation-traceability bundle into one executive-facing private-beta Compliance Story without reconstructing recommendation rules in HTML, CSS, page controllers, report templates or PDF templates.

The completed release includes:

- a versioned Compliance Story schema and pure model;
- a company snapshot derived from confirmed and derived facts;
- separate safe applicability and evidence-status counts;
- no more than three deterministically ranked priorities;
- every governed rule outcome grouped by advisory domain;
- rationale, trigger facts, missing information, next actions, timelines and implications;
- structured source references, limitations and assumptions;
- loading, empty and safe error states;
- responsive, keyboard and reduced-motion presentation safeguards;
- maintained contract, regression and Playwright coverage.

The stable route remains `/analyze-company.html`.

The private-beta route remains `/analyze-company-v3.html` and `complianceDnaV3` remains disabled by default.

M3 does not mutate protected browser state, the stable report, PDF, email or delivery contracts. Stable report/PDF integration remains a separately approved migration.

### Acceptance result

The version cut is committed only after version consistency, compliance validation, the complete maintained regression suite and stable/M1/M2/M3 browser coverage pass on the release branch.
"""
          roadmap_path.write_text(roadmap[:start] + completed_section + roadmap[end:])

          changelog_path = Path("CHANGELOG.md")
          changelog = changelog_path.read_text()
          marker = "\n---\n\n## [v0.15.0-beta]"
          if marker not in changelog:
              raise SystemExit("The changelog insertion marker was not found.")
          release_block = """
---

## [v0.18.0] - Compliance Story and Safe Health Model

**Release Date:** 2026-07-21

### Added

- Added the versioned M3 Compliance Story model and JSON Schema `1.0.0`.
- Added a private-beta executive story with a company snapshot, safe-status counts, top three priorities, grouped findings, assumptions, implications and structured sources.
- Added isolated M3 presentation styles with responsive, keyboard-focus and reduced-motion safeguards.
- Added M3 contract tests and Playwright coverage for ready, empty, error and mobile states.
- Added the M3 release manifest and rollback record.

### Safety and compatibility

- Kept `/analyze-company.html` as the stable production route.
- Kept `/analyze-company-v3.html` private and `complianceDnaV3` disabled by default.
- Preserved protected browser-storage, report, PDF, email and delivery contracts.
- Preserved deterministic M2 applicability decisions and separated applicability from evidence status.
- Added no cloud persistence, account requirement or storage migration.

### Validation

- GrowWithHR CI passed.
- Compliance Data Validation passed.
- Executive Assessment Tests passed, including M3 browser coverage.
- The complete maintained regression suite passed before the version-cut commit.
"""
          changelog_path.write_text(
              changelog.replace(marker, release_block + "\n---\n\n## [v0.15.0-beta]", 1)
          )

          manifest_path = Path("docs/releases/v0.18.0-m3-compliance-story.md")
          manifest = manifest_path.read_text()
          identity_marker = "- Target version: `0.18.0`\n"
          if identity_marker not in manifest:
              raise SystemExit("The M3 release identity marker was not found.")
          manifest = manifest.replace(
              identity_marker,
              identity_marker + "- Release status: Complete and validated\n",
              1
          )
          manifest_path.write_text(manifest)
          PY

      - name: Synchronize governed version metadata
        run: npm run version:sync

      - name: Validate version, compliance and regression contracts
        shell: bash
        run: |
          set -euo pipefail
          npm run version:check
          npm run validate:compliance
          npm test
          git diff --check

      - name: Install Playwright browser test package
        run: npm install --no-save --package-lock=false --no-audit --no-fund @playwright/test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate stable and private-beta browser routes
        run: >
          npx playwright test
          tests/e2e/executive-assessment-modules.spec.ts
          tests/e2e/analyze-company-current.spec.ts
          tests/e2e/analyze-company-v3.spec.ts
          tests/e2e/analyze-company-v3-traceability.spec.ts
          tests/e2e/analyze-company-v3-compliance-story.spec.ts
          --project=chromium

      - name: Verify coordinated change set
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t CHANGED_FILES < <(git diff --name-only)
          if [[ "${#CHANGED_FILES[@]}" -eq 0 ]]; then
            echo "No version-cut changes were produced."
            exit 1
          fi

          FOUND_PACKAGE=false
          FOUND_APP_CONFIG=false
          FOUND_HTML=false
          FOUND_BASELINE_TEST=false
          FOUND_STATIC_TEST=false
          FOUND_ROADMAP=false
          FOUND_CHANGELOG=false
          FOUND_MANIFEST=false

          for FILE in "${CHANGED_FILES[@]}"; do
            case "${FILE}" in
              package.json) FOUND_PACKAGE=true ;;
              js/config/app-config.js) FOUND_APP_CONFIG=true ;;
              tests/baseline-contract-checks.js) FOUND_BASELINE_TEST=true ;;
              tests/requirements-static-check.js) FOUND_STATIC_TEST=true ;;
              ROADMAP.md) FOUND_ROADMAP=true ;;
              CHANGELOG.md) FOUND_CHANGELOG=true ;;
              docs/releases/v0.18.0-m3-compliance-story.md) FOUND_MANIFEST=true ;;
              *.html) FOUND_HTML=true ;;
              *)
                echo "Unexpected version-cut change: ${FILE}"
                exit 1
                ;;
            esac
          done

          [[ "${FOUND_PACKAGE}" == "true" ]] || { echo "package.json was not updated."; exit 1; }
          [[ "${FOUND_APP_CONFIG}" == "true" ]] || { echo "app-config.js was not updated."; exit 1; }
          [[ "${FOUND_HTML}" == "true" ]] || { echo "No visible HTML labels were updated."; exit 1; }
          [[ "${FOUND_BASELINE_TEST}" == "true" ]] || { echo "Baseline version assertion was not updated."; exit 1; }
          [[ "${FOUND_STATIC_TEST}" == "true" ]] || { echo "Static version assertion was not updated."; exit 1; }
          [[ "${FOUND_ROADMAP}" == "true" ]] || { echo "ROADMAP.md was not updated."; exit 1; }
          [[ "${FOUND_CHANGELOG}" == "true" ]] || { echo "CHANGELOG.md was not updated."; exit 1; }
          [[ "${FOUND_MANIFEST}" == "true" ]] || { echo "M3 release manifest was not updated."; exit 1; }

          echo "Validated release-cut files:"
          printf -- '- %s\n' "${CHANGED_FILES[@]}"

      - name: Commit coordinated version cut
        shell: bash
        run: |
          set -euo pipefail
          rm ".github/workflows/cut-v0.18.0.yml"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "release: cut v${TARGET_VERSION}"
          git push origin HEAD:${RELEASE_BRANCH}

      - name: Record release-cut summary
        shell: bash
        run: |
          {
            echo "## v0.18.0 version cut"
            echo
            echo "- Canonical version synchronized"
            echo "- Roadmap, changelog and manifest updated"
            echo "- Compliance validation passed"
            echo "- Complete maintained regression suite passed"
            echo "- Stable, M1, M2 and M3 Playwright coverage passed"
            echo "- Release commit pushed to \`${RELEASE_BRANCH}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
