name: Export Client Readiness Base

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/export-client-readiness-base.yml"

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'fix/client-readiness-v0.18.0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/client-readiness-v0.18.0
          fetch-depth: 0
      - name: Export tracked branch tree
        run: |
          mkdir -p export
          git archive --format=tar.gz -o export/base-tree.tar.gz HEAD
          git ls-files -s > export/base-index.txt
          git rev-parse HEAD > export/base-commit-sha.txt
          git rev-parse HEAD^{tree} > export/base-tree-sha.txt
      - uses: actions/upload-artifact@v4
        with:
          name: client-readiness-base-tree
          path: export/
          retention-days: 2
